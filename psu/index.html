<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSU Configuration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <form class="config-card">
      <header class="config-header">
        <div>
          <p class="eyebrow">Your configuration</p>
          <h1>Choose your components</h1>
        </div>
        <button class="reset-button" type="reset" aria-label="Reset all selected component data">
          <span class="reset-icon" aria-hidden="true">↻</span>
          <span>Reset Data</span>
        </button>
      </header>
      <section class="component-section">
        <h2>CPU</h2>
        <div class="fields-grid">
          <div class="field">
            <label for="field-1">Brand</label>
            <select id="field-1" name="brand">
              <option value="Select Brand" disabled>Select Brand</option>
              <option value="0">AMD</option>
              <option value="1" selected>INTEL</option>
            </select>
          </div>
          <div class="field">
            <label for="field-2">Socket</label>
            <select id="field-2" name="socket">
              <option value="Select Socket" disabled>Select Socket</option>
              <option value="0" selected>LGA 1150</option>
              <option value="1">LGA 1151</option>
              <option value="2">LGA 1155</option>
              <option value="3">LGA 1156</option>
              <option value="4">LGA 1200</option>
              <option value="5">LGA 1700</option>
              <option value="6">LGA 1851</option>
              <option value="7">LGA 2011</option>
              <option value="8">LGA 2011-v3</option>
              <option value="9">LGA 2066</option>
            </select>
          </div>
          <div class="field">
            <label for="field-3">Model</label>
            <select id="field-3" name="model">
              <option value="" selected disabled>Select Model</option>
              <option value="54||Celeron G1820">Celeron G1820</option>
              <option value="54||Celeron G1830">Celeron G1830</option>
              <option value="54||Celeron G1840">Celeron G1840</option>
              <option value="54||Celeron G1850">Celeron G1850</option>
              <option value="54||Core i3-4130">Core i3-4130</option>
              <option value="54||Core i3-4150">Core i3-4150</option>
              <option value="54||Core i3-4160">Core i3-4160</option>
              <option value="35||Core i3-4160T">Core i3-4160T</option>
              <option value="54||Core i3-4170">Core i3-4170</option>
              <option value="54||Core i3-4330">Core i3-4330</option>
              <option value="54||Core i3-4340">Core i3-4340</option>
              <option value="54||Core i3-4350">Core i3-4350</option>
              <option value="54||Core i3-4360">Core i3-4360</option>
              <option value="84||Core i5-4430">Core i5-4430</option>
              <option value="65||Core i5-4430S">Core i5-4430S</option>
              <option value="84||Core i5-4440">Core i5-4440</option>
              <option value="84||Core i5-4570">Core i5-4570</option>
              <option value="65||Core i5-4570S">Core i5-4570S</option>
              <option value="35||Core i5-4570T">Core i5-4570T</option>
              <option value="35||Core i5-4570TE">Core i5-4570TE</option>
              <option value="84||Core i5-4590">Core i5-4590</option>
              <option value="65||Core i5-4590S">Core i5-4590S</option>
              <option value="84||Core i5-4670">Core i5-4670</option>
              <option value="84||Core i5-4670K">Core i5-4670K</option>
              <option value="84||Core i5-4690">Core i5-4690</option>
              <option value="88||Core i5-4690K">Core i5-4690K</option>
              <option value="65||Core i5-5675C">Core i5-5675C</option>
              <option value="35||Core i7-4765T">Core i7-4765T</option>
              <option value="84||Core i7-4770">Core i7-4770</option>
              <option value="84||Core i7-4770K">Core i7-4770K</option>
              <option value="65||Core i7-4770S">Core i7-4770S</option>
              <option value="45||Core i7-4770T">Core i7-4770T</option>
              <option value="84||Core i7-4771">Core i7-4771</option>
              <option value="84||Core i7-4790">Core i7-4790</option>
              <option value="88||Core i7-4790K">Core i7-4790K</option>
              <option value="65||Core i7-4790S">Core i7-4790S</option>
              <option value="65||Core i7-5775C">Core i7-5775C</option>
              <option value="54||Pentium G3220">Pentium G3220</option>
              <option value="35||Pentium G3220T">Pentium G3220T</option>
              <option value="54||Pentium G3240">Pentium G3240</option>
              <option value="35||Pentium G3250T">Pentium G3250T</option>
              <option value="54||Pentium G3258">Pentium G3258</option>
              <option value="35||Pentium G3260T">Pentium G3260T</option>
              <option value="54||Pentium G3420">Pentium G3420</option>
              <option value="54||Pentium G3430">Pentium G3430</option>
              <option value="54||Pentium G3450">Pentium G3450</option>
            </select>
          </div>
        </div>
      </section>
      <section class="component-section">
        <h2>Motherboard</h2>
        <div class="fields-grid">
          <div class="field">
            <label for="field-4">Form factor</label>
            <select id="field-4" name="form-factor">
              <option value="Select Form Factor" disabled>Select Form Factor</option>
              <option value="0">ATX</option>
              <option value="1" selected>Micro ATX</option>
              <option value="2">Mini-ATX</option>
              <option value="3">Thin Mini-ITX</option>
              <option value="4">SSI CEB</option>
              <option value="5">SSI EEB</option>
              <option value="6">XL ATX</option>
            </select>
          </div>
        </div>
      </section>
      <section class="component-section">
        <h2>GPU</h2>
        <div class="fields-grid">
          <div class="field">
            <label for="field-5">Brand</label>
            <select id="field-5" name="brand">
              <option value="Select Brand" disabled>Select Brand</option>
              <option value="0">NVIDIA</option>
              <option value="1">AMD</option>
              <option value="2" selected>Intel</option>
            </select>
          </div>
          <div class="field">
            <label for="field-6">Graphic Cards</label>
            <select id="field-6" name="graphic-cards">
              <option value="Select Graphic Cards" disabled>Select Graphic Cards</option>
              <option value="0">Arc A310</option>
              <option value="1">Arc A350</option>
              <option value="2">Arc A380</option>
              <option value="3">Arc A580</option>
              <option value="4">Arc A750</option>
              <option value="5">Arc A770</option>
              <option value="6">Arc Pro A40</option>
              <option value="7" selected>Arc Pro A50</option>
              <option value="8">Arc Pro A60</option>
              <option value="9">Arc B570</option>
              <option value="10">Arc B580</option>
              <option value="11">Arc Pro B50</option>
              <option value="12">Arc Pro B60</option>
            </select>
          </div>
          <div class="field">
            <label for="field-7">Quantity</label>
            <select id="field-7" name="quantity">
              <option value="" selected disabled>Quantity</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
      </section>
      <section class="component-section">
        <h2>RAM</h2>
        <div class="fields-grid">
          <div class="field field--wide">
            <label for="field-8">Memory module</label>
            <select id="field-8" name="memory-module">
              <option value="Select Memory Module" disabled>Select Memory Module</option>
              <option value="0">32GB DDR5</option>
              <option value="1">16GB DDR5</option>
              <option value="2">8GB DDR5</option>
              <option value="3">4GB DDR5</option>
              <option value="4" selected>32GB DDR4</option>
              <option value="5">16GB DDR4</option>
              <option value="6">8GB DDR4</option>
              <option value="7">4GB DDR4</option>
              <option value="8">32GB DDR3</option>
              <option value="9">8GB DDR3</option>
              <option value="10">4GB DDR3</option>
              <option value="11">2GB DDR3</option>
            </select>
          </div>
          <div class="field">
            <label for="field-9">Quantity</label>
            <select id="field-9" name="quantity">
              <option value="" selected disabled>Quantity</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
      </section>
      <section class="component-section">
        <h2>SSD</h2>
        <div class="fields-grid">
          <div class="field field--wide">
            <label for="field-10">RMP &amp; Size</label>
            <select id="field-10" name="rmp-and-size">
              <option value="" selected disabled>Select RMP &amp; Size</option>
              <option value="0">Not Installed</option>
              <option value="1">Under 120GB</option>
              <option value="2">120GB - 256GB</option>
              <option value="3">256GB - 512GB</option>
              <option value="4">512GB - 1TB</option>
              <option value="5">1TB+</option>
            </select>
          </div>
          <div class="field field--disabled">
            <label for="field-11">Quantity</label>
            <select id="field-11" name="quantity" disabled>
              <option value="" selected disabled>Quantity</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
      </section>
      <section class="component-section">
        <h2>HDD</h2>
        <div class="fields-grid">
          <div class="field field--wide">
            <label for="field-12">RMP &amp; Size</label>
            <select id="field-12" name="rmp-and-size">
              <option value="" selected disabled>Select RMP &amp; Size</option>
              <option value="0">Not Installed</option>
              <option value="1">5400RPM 3.5&quot; HDD</option>
              <option value="2">7200RPM 3.5&quot; HDD</option>
              <option value="3">10,000RPM 2.5&quot; HDD</option>
              <option value="4">10,000RPM 3.5&quot; HDD</option>
              <option value="5">15,000RPM 2.5&quot; HDD</option>
              <option value="6">15,000RPM 3.5&quot; HDD</option>
            </select>
          </div>
          <div class="field field--disabled">
            <label for="field-13">Quantity</label>
            <select id="field-13" name="quantity" disabled>
              <option value="" selected disabled>Quantity</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
      </section>
      <section class="component-section component-section--last">
        <h2>Optical Drive</h2>
        <div class="fields-grid">
          <div class="field">
            <label for="field-14">RPM &amp; Size</label>
            <select id="field-14" name="rpm-and-size">
              <option value="" selected disabled>Select Form Factor</option>
              <option value="0">Not Installed</option>
              <option value="1">Blu-Ray</option>
              <option value="2">DVD-RW</option>
              <option value="3">COMBO</option>
              <option value="4">CD-RW</option>
              <option value="5">DVD-ROM</option>
              <option value="6">CD-ROM</option>
            </select>
          </div>
        </div>
      </section>
    </form>
  </main>
</body>
</html>
