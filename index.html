<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Managment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png" type="image">
</head>

<body>
    <header>
        <h1>نرم افزار مدیریت درخواست و ثبت تجهیزات فناوری</h1>
        <div class="user-profile">
            <img src="profile-avatar.avif" alt="user profile" class="avatar">
            <div class="user-info">
                <p class="username">نوید احمدزاده</p>
                <p class="userrole">فناوری اطلاعات</p>
            </div>
        </div>
        <img src="logo.png" alt="لوگو شرکت">
    </header>
    <form action="send-case-info">
        <fieldset class="form-section">
            <legend>
                اطلاعات تحویل گیرنده
            </legend>
            <section class="userinfo">
                <div class="form-name">
                    <div>
                        <label for="name">نام :</label>
                        <input type="text" id="name" placeholder="نام">
                    </div>
                    <div>
                        <label for="family-name">نام خانوادگی :</label>
                        <input type="text" id="family-name" placeholder="نام ختنوادگی">
                    </div>
                    <div>
                        <label for="national-code">کد ملی :</label>
                        <input type="number" id="national-code" placeholder="کد ملی">
                    </div>
                </div>


                <div class="container">
                    <div>
                        <label for="moavenat">معاونت :</label>
                        <select name="moavenat" id="moavenat">
                            <option value="moavenat" disabled>معاونت</option>
                            <option value="1">معاونت 1</option>
                            <option value="2">معاونت 2</option>
                            <option value="3">معاونت 3</option>
                            <option value="4">معاونت 4</option>

                        </select>
                    </div>
                    <div>
                        <label for="edare">اداره/واحد :</label>
                        <select name="edare" id="edare">
                            <option value="edare" disabled>اداره</option>
                            <option value="1">اداره 1</option>
                            <option value="2">اداره 2</option>
                            <option value="3">اداره 3</option>
                            <option value="4">اداره 4</option>
                        </select>
                    </div>
                </div>
            </section>
        </fieldset>
        <fieldset class="form-section">
            <legend>
                ثبت مشخصات تحویلی کیس
            </legend>
            <section class="it-numbers">
                <div class="shomare-amval">
                    <label for="shomare-amval"> شماره اموال :</label>
                    <input type="number" id="shomare-amval" placeholder="شماره اموال">
                </div>
                <div class="shomare-it">
                    <label for="shomare-it"> شماره IT :</label>
                    <input type="number" id="shomare-it" placeholder="شماره IT">
                </div>
            </section>
        </fieldset>
        <fieldset class="form-section">
            <legend>ثبت مشخصات فنی کیس</legend>
            <section class="hardware">
                <section class="component">
                    <h2>CPU</h2>
                    <div class="cpu">
                        <div class="cpu brand">
                            <label for="cpu-brand">Brand</label>
                            <select name="cpu-brand" id="cpu-brand">
                                <option value="Select Brand" disabled>Select Brand</option>
                                <option value="0">AMD</option>
                                <option value="1" selected>INTEL</option>
                            </select>
                        </div>
                        <div class="cpu socket">
                            <label for="cpu-socket">Socket</label>
                            <select name="cpu-socket" id="cpu-socket">
                                <option value="Select Socket" disabled>Select Socket</option>
                                <option value="0">LGA 1700</option>
                                <option value="1">LGA 1800</option>
                                <option value="2">LGA 1800</option>
                                <option value="3">LGA 1900</option>
                            </select>
                        </div>
                        <div class="cpu model">
                            <label for="cpu-model">Model</label>
                            <select name="cpu-model" id="cpu-model">
                                <option value="Select Model" disabled>Select Model</option>
                                <option value="84||Core i5-4670">Core i5-4670</option>
                                <option value="84||Core i5-4670K">Core i5-4670K</option>
                                <option value="84||Core i5-4690">Core i5-4690</option>
                                <option value="88||Core i5-4690K">Core i5-4690K</option>
                                <option value="65||Core i5-5675C">Core i5-5675C</option>
                            </select>
                        </div>
                    </div>
                </section>
                <section class="component">
                    <h2>MotherBoard</h2>
                    <div class="motherboard">
                        <div class="motherboard brand">
                            <label for="brand">Brand</label>
                            <select id="brand" name="brand">
                                <option value="Select Brand" disabled>Select Brand</option>
                                <option value="0">ASUS</option>
                                <option value="1" selected>GIGABYTE</option>
                                <option value="2">Asrock</option>
                                <option value="3">MSI</option>
                                <option value="4">EVGA</option>
                                <option value="5">Biostar</option>
                                <option value="6">Intel</option>
                            </select>
                        </div>
                        <div class="motherboard form-factor">
                            <label for="form-factor">Form Factor</label>
                            <select id="form-factor" name="form-factor">
                                <option value="Select Form Factor" disabled>Select Form Factor</option>
                                <option value="0">ATX</option>
                                <option value="1" selected>Micro ATX</option>
                                <option value="2">Mini-ATX</option>
                                <option value="3">E-ATX</option>
                                <option value="4">SSI CEB</option>
                                <option value="5">SSI EEB</option>
                                <option value="6">XL ATX</option>
                            </select>
                        </div>
                        <div class="motherboard model">
                            <label for="model">Model</label>
                            <select id="model" name="model">
                                <option value="Select MOdel" disabled>Select Model</option>
                                <option value="0">X-399 E-GAMING</option>
                                <option value="1" selected>PRIME H310-PLUS R2.0</option>
                                <option value="2">PRIME H310M-K</option>
                                <option value="3">B360M-DRAGON S</option>
                                <option value="4">TUF GAMING Z490-PLUS</option>
                                <option value="5">TUF GAMING B560M-E</option>
                                <option value="6">PRIME Z590-V</option>
                            </select>
                        </div>
                    </div>
                </section>
                <section class="component">
                    <h2>GPU</h2>
                    <div class="gpu">
                        <div class="gpu option">
                            <div class="gpu-option">
                                <input type="radio" id="gpu-onboard" name="gpu-type" value="onboard" checked>
                                <label for="gpu-onboard">Onboard</label>
                            </div>
                            <div class="gpu-option">
                                <input type="radio" id="gpu-internal" name="gpu-type" value="internal">
                                <label for="gpu-internal">Internal</label>
                            </div>
                        </div>
                        <div class="gpu brand">
                            <label for="brand">Brand</label>
                            <select id="brand" name="brand">
                                <option value="Select Brand" disabled>Select Brand</option>
                                <option value="0">ASUS</option>
                                <option value="1" selected>EVGA</option>
                                <option value="2">GIGABYTE</option>
                                <option value="3">MSI</option>
                                <option value="4">ZOTAK</option>
                                <option value="5">ASROCK</option>
                                <option value="6">INTEL</option>
                                <option value="7">Saphire</option>
                            </select>
                        </div>
                        <div class="gpu model">
                            <label for="model">Model</label>
                            <select id="model" name="model">
                                <option value="Select Model" disabled>Select Model</option>
                                <option value="0">GTX-1080</option>
                                <option value="1" selected>GTX-1070</option>
                                <option value="2">GTX-1060</option>
                                <option value="3">GTX-1050</option>
                                <option value="4">GTX-1030</option>
                                <option value="5">GTX-1660</option>
                                <option value="6">RTX-2070</option>
                                <option value="7">RTX-2060</option>
                            </select>
                        </div>
                        <div class="gpu memory">
                            <label for="memory">Memory</label>
                            <select id="memory" name="memory">
                                <option value="Select Memory" disabled>Select Memory</option>
                                <option value="0">1GB</option>
                                <option value="1" selected>2GB</option>
                                <option value="2">3GB</option>
                                <option value="3">4GB</option>
                                <option value="4">6GB</option>
                                <option value="5">8GB</option>
                                <option value="6">10GB</option>
                                <option value="7">12GB</option>
                            </select>
                        </div>
                    </div>
                </section>

            </section>

        </fieldset>
    </form>




</body>

</html>
